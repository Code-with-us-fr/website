<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Cercle extérieur Bleu Roi -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="#1e40af" stroke-width="6"/>

  <!-- Écran d'ordinateur (Ajusté à y=31 pour un centrage vertical parfait avec le pied) -->
  <rect x="28" y="31" width="44" height="32" rx="4" fill="none" stroke="#1e40af" stroke-width="4"/>
  <line x1="28" y1="57" x2="72" y2="57" stroke="#1e40af" stroke-width="3"/>

  <!-- Pied de l'ordinateur -->
  <path d="M44 63 L40 71 L60 71 L56 63 Z" fill="#1e40af"/>
  <line x1="36" y1="71" x2="64" y2="71" stroke="#1e40af" stroke-width="3" stroke-linecap="round"/>

  <!-- Lignes de code simulées à l'intérieur -->
  <line x1="36" y1="39" x2="52" y2="39" stroke="#1e40af" stroke-width="3" stroke-linecap="round"/>
  <line x1="56" y1="39" x2="62" y2="39" stroke="#1e40af" stroke-width="3" stroke-linecap="round"/>

  <line x1="36" y1="45" x2="44" y2="45" stroke="#1e40af" stroke-width="3" stroke-linecap="round"/>
  <line x1="48" y1="45" x2="64" y2="45" stroke="#1e40af" stroke-width="3" stroke-linecap="round"/>

  <line x1="36" y1="51" x2="58" y2="51" stroke="#1e40af" stroke-width="3" stroke-linecap="round"/>
</svg>
